<script type="module">
    import * as THREE from 'https://esm.sh/three@0.183.2.0';
    const container = document.getElementById('flag-container');
    const fallbackImg = document.getElementById('fallback-img');
    let renderer, scene, camera, flag, geometry, originalPositions;
    const flagWidth = 2.5;

    fallbackImg.style.display = 'none';

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(160, 160);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearAlpha(0);
    renderer.toneMappingExposure = 1.3;
    renderer.toneMapping = THREE.LinearToneMapping
    container.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(2, 3, 5);
    scene.add(dirLight);

    const loader = new THREE.TextureLoader();
    loader.load(
        'invader-160.png',
        onLoad,
        undefined,
        onError
    );

    function onLoad(texture) {
        texture.colorSpace = THREE.SRGBColorSpace;
        createFlag(texture);
        animate();
    }

    function onError(err) {
        console.error('Failed to load texture:', err);
        fallbackImg.style.display = 'block';
    }

    function createFlag(texture) {
        geometry = new THREE.PlaneGeometry(flagWidth, flagWidth, 20, 20);
        originalPositions = geometry.attributes.position.array.slice();

        const material = new THREE.MeshStandardMaterial({
            map: texture,
            transparent: true,
            side: THREE.DoubleSide,
            roughness: 0.6,
            metalness: 0.1
        });

        flag = new THREE.Mesh(geometry, material);
        scene.add(flag);
    }

    const timer = new THREE.Timer();
    timer.connect(document);

    function animate() {
        requestAnimationFrame(animate);
        if (!flag) return;

        timer.update();
        const time = timer.getElapsed();
        const positions = geometry.attributes.position.array;

        const waveSpeed = 2.2;
        const waveFrequency = 1.4;
        const maxAmplitude = 0.35;

        for (let i = 0; i < positions.length; i += 3) {
            const x = originalPositions[i];
            const poleFactor = (x + flagWidth / 2) / flagWidth;
            positions[i + 2] = maxAmplitude * poleFactor * Math.sin(x * waveFrequency - time * waveSpeed);
        }

        geometry.attributes.position.needsUpdate = true;
        geometry.computeVertexNormals();

        camera.position.x = Math.sin(time) * 0.5;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    animate();
</script>
